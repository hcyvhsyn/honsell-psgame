name: Deploy Honsell Store

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/honsell-psgame
            # Serverdə yerli dəyişikliklər (məs. npm install-ın toxunduğu
            # package-lock.json) git pull-u bloklayır. Pull-dan əvvəl origin/main-ə
            # sərt sıfırla. .env untracked olduğu üçün toxunulmur.
            git fetch origin main
            git reset --hard origin/main
            ./deploy.sh
